<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>semantic_search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111113;
      --surface:  #1a1a1d;
      --border:   #2a2a2e;
      --border-hover: #404046;
      --text:     #d4d4d8;
      --muted:    #71717a;
      --dim:      #3f3f46;
      --accent:   #e4e4e7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .wordmark {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
    }

    #search-wrap {
      flex: 1;
      position: relative;
      max-width: 680px;
    }

    #search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--accent);
      font-size: 14px;
      padding: 9px 14px 9px 38px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search-input:focus { border-color: var(--border-hover); }
    #search-input::placeholder { color: var(--dim); }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      pointer-events: none;
    }

    #count {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    #reindex-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      padding: 7px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #reindex-btn:hover:not(:disabled) { border-color: var(--border-hover); color: var(--text); }
    #reindex-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #reindex-btn.running { color: var(--muted); }

    .ri-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    #reindex-btn.running .ri-spinner { display: block; }

    /* ── Status bar ── */
    #statusbar {
      padding: 10px 24px;
      font-size: 12px;
      color: var(--muted);
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Grid ── */
    #grid {
      padding: 4px 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      flex: 1;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.12s, box-shadow 0.12s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: var(--bg);
    }

    .card-thumb-wrap {
      position: relative;
    }
    .gif-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.55);
      color: #d4d4d8;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 2px 5px;
      border-radius: 3px;
      pointer-events: none;
      user-select: none;
    }

    .card-meta {
      padding: 7px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-name {
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
    }

    .card-score {
      color: var(--dim);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card:hover .card-score { color: var(--muted); }

    /* ── Action buttons — overlaid on the image on hover ── */
    .card-actions {
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      display: none;
      gap: 6px;
      justify-content: center;
    }
    .card:hover .card-actions { display: flex; }

    .btn-copy, .btn-similar {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: #d4d4d8;
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .btn-copy:hover, .btn-similar:hover { border-color: rgba(255,255,255,0.35); color: #fff; }
    .btn-copy.copied { color: #4ade80; border-color: #4ade80; }

    /* ── Similar mode banner ── */
    #similar-banner {
      display: none;
      padding: 8px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      gap: 10px;
      align-items: center;
    }
    #similar-banner.active { display: flex; }
    #similar-banner img {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }
    #similar-clear {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
    }
    #similar-clear:hover { border-color: var(--border-hover); color: var(--text); }

    /* ── Empty / error states ── */
    .placeholder {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 0;
      color: var(--dim);
      line-height: 1.8;
    }
    .placeholder strong {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 4px;
      cursor: default;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }
    #lightbox-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px 6px 14px;
      max-width: 80vw;
    }
    #lightbox-path {
      color: #aaa;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .lb-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #aaa;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.1s, color 0.1s;
    }
    .lb-btn:hover { border-color: rgba(255,255,255,0.4); color: #eee; }
    .lb-btn.copied { color: #4ade80; border-color: #4ade80; }
  </style>
</head>
<body>

  <header>
    <span class="wordmark">semantic_search</span>
    <div id="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text"
        placeholder='Try "moody forest lighting" or "hard surface sci-fi panel" …'
        autocomplete="off" spellcheck="false" autofocus />
    </div>
    <span id="count"></span>
    <button id="reindex-btn" title="Scan watched folders for new or changed images">
      <div class="ri-spinner"></div>
      <span id="reindex-label">reindex</span>
    </button>
  </header>

  <div id="similar-banner">
    <img id="similar-thumb" src="" alt="" />
    <span id="similar-label"></span>
    <button id="similar-clear" onclick="clearSimilar()">✕ clear</button>
  </div>

  <div id="statusbar">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Type a query to search your library.</span>
  </div>

  <div id="grid">
    <div class="placeholder">
      <strong>Your reference library, searchable.</strong>
      Type any descriptive phrase in the search bar above.
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
    <div id="lightbox-bar" onclick="event.stopPropagation()">
      <span id="lightbox-path"></span>
      <button class="lb-btn" id="lb-copy-btn" onclick="lbCopyPath()">copy path</button>
      <button class="lb-btn" onclick="lbFindSimilar()">find similar</button>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('search-input');
    const grid        = document.getElementById('grid');
    const statusText  = document.getElementById('status-text');
    const spinner     = document.getElementById('spinner');
    const countEl     = document.getElementById('count');
    const lightbox    = document.getElementById('lightbox');
    const lbImg       = document.getElementById('lightbox-img');
    const lbPath      = document.getElementById('lightbox-path');

    let debounceTimer        = null;
    let currentQuery         = '';
    let currentResults       = [];
    let currentLightboxIndex = -1;

    // ── Fetch index count on load ──
    fetch('/search?q=a&top=1')
      .then(r => r.json())
      .then(() => {})
      .catch(() => {});

    // ── Search input ──
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const q = searchInput.value.trim();
      if (!q) {
        grid.innerHTML = '<div class="placeholder"><strong>Your reference library, searchable.</strong>Type any descriptive phrase in the search bar above.</div>';
        setStatus('');
        countEl.textContent = '';
        currentQuery = '';
        return;
      }
      setStatus('', true);
      debounceTimer = setTimeout(() => runSearch(q), 280);
    });

    // Lightbox keyboard navigation
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') { closeLightbox(); return; }
      if (e.key === 'ArrowRight') navigateLightbox(1);
      if (e.key === 'ArrowLeft')  navigateLightbox(-1);
    });

    // ── Search ──
    async function runSearch(q) {
      currentQuery = q;
      try {
        const res  = await fetch(`/search?q=${encodeURIComponent(q)}&top=60`);
        const data = await res.json();

        if (q !== currentQuery) return; // stale

        if (data.error) {
          setStatus(data.error);
          grid.innerHTML = `<div class="placeholder"><strong>Error</strong>${data.error}</div>`;
          return;
        }

        renderResults(data.results, q);
      } catch (err) {
        setStatus(`Request failed: ${err.message}`);
      }
    }

    function renderResults(results, q) {
      currentResults = results;
      spinner.classList.remove('active');

      if (results.length === 0) {
        setStatus(q ? `No results for "${q}"` : 'No similar images found.');
        grid.innerHTML = '<div class="placeholder"><strong>No results found.</strong>Try a different query.</div>';
        countEl.textContent = '';
        return;
      }

      const noun = results.length === 1 ? 'result' : 'results';
      if (q) setStatus(`${results.length} ${noun} for "${q}"`);
      countEl.textContent = '';

      grid.innerHTML = results.map((r, i) => {
        const thumb = imgUrl(r.path, 400);
        const pct   = (r.score * 100).toFixed(1);
        return `
          <div class="card" data-path="${escHtml(r.path)}" data-thumb="${escHtml(thumb)}" data-index="${i}">
            <div class="card-thumb-wrap">
              <img class="card-thumb" src="${escHtml(thumb)}" alt="${escHtml(r.filename)}" loading="${i < 20 ? 'eager' : 'lazy'}" />
              ${isGif(r.path) ? '<span class="gif-badge">GIF</span>' : ''}
              <div class="card-actions">
                <button class="btn-copy" onclick="copyPath(event, this, '${escAttr(r.path)}')">copy path</button>
                <button class="btn-similar" onclick="runSimilar(event, '${escAttr(r.path)}')">find similar</button>
              </div>
            </div>
            <div class="card-meta">
              <span class="card-name" title="${escHtml(r.path)}">${escHtml(r.filename)}</span>
              <span class="card-score">${pct}%</span>
            </div>
          </div>`;
      }).join('');

      // Open lightbox on card click (but not on the copy button)
      // For GIFs: animate on hover, static thumb otherwise.
      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', e => {
          if (e.target.closest('.btn-copy') || e.target.closest('.btn-similar')) return;
          openLightbox(card.dataset.path, card.dataset.thumb, parseInt(card.dataset.index));
        });
        if (isGif(card.dataset.path)) {
          const img = card.querySelector('.card-thumb');
          card.addEventListener('mouseenter', () => { img.src = rawUrl(card.dataset.path); });
          card.addEventListener('mouseleave', () => { img.src = card.dataset.thumb; });
        }

      });
    }

    // ── Lightbox ──
    function openLightbox(path, thumbUrl, index = -1) {
      // GIFs: serve raw so they animate. Others: large thumbnail.
      lbImg.src = isGif(path) ? rawUrl(path) : imgUrl(path, 1920);
      lbImg.alt = path;
      lbPath.textContent = path;
      currentLightboxIndex = index;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function navigateLightbox(dir) {
      if (currentResults.length === 0 || currentLightboxIndex === -1) return;
      const next = currentLightboxIndex + dir;
      if (next < 0 || next >= currentResults.length) return;
      const r = currentResults[next];
      openLightbox(r.path, imgUrl(r.path, 400), next);
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    async function lbCopyPath() {
      const btn = document.getElementById('lb-copy-btn');
      try {
        await navigator.clipboard.writeText(lbPath.textContent);
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy path'; btn.classList.remove('copied'); }, 1500);
      } catch {
        btn.textContent = 'failed';
        setTimeout(() => { btn.textContent = 'copy path'; }, 1500);
      }
    }

    function lbFindSimilar() {
      const path = lbPath.textContent;
      closeLightbox();
      runSimilar({ stopPropagation: () => {} }, path);
    }

    // ── Copy path ──
    async function copyPath(e, btn, path) {
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(path);
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'copy path';
          btn.classList.remove('copied');
        }, 1500);
      } catch {
        btn.textContent = 'failed';
        setTimeout(() => { btn.textContent = 'copy path'; }, 1500);
      }
    }

    // ── Find similar ──
    const similarBanner = document.getElementById('similar-banner');
    const similarThumb  = document.getElementById('similar-thumb');
    const similarLabel  = document.getElementById('similar-label');

    async function runSimilar(e, path) {
      e.stopPropagation();
      setStatus('', true);
      currentQuery = '';
      searchInput.value = '';

      const thumbUrl = imgUrl(path, 400);
      similarThumb.src = thumbUrl;
      similarLabel.textContent = `Similar to: ${path.split('/').pop()}`;
      similarBanner.classList.add('active');

      try {
        const res  = await fetch(`/similar?path=${encodeURIComponent(path)}&top=60`);
        const data = await res.json();
        if (!res.ok || data.error) {
          const msg = data.detail || data.error || 'Unknown error';
          setStatus(`Error: ${msg}`);
          grid.innerHTML = `<div class="placeholder"><strong>Error</strong>${escHtml(String(msg))}</div>`;
          return;
        }
        const results = data.results || [];
        renderResults(results, null);
        const noun = results.length === 1 ? 'result' : 'results';
        setStatus(`${results.length} ${noun} visually similar to "${data.query_filename}"`);
      } catch (err) {
        setStatus(`Error: ${err.message}`);
      }
    }

    function clearSimilar() {
      similarBanner.classList.remove('active');
      similarThumb.src = '';
      grid.innerHTML = '<div class="placeholder"><strong>Your reference library, searchable.</strong>Type any descriptive phrase in the search bar above.</div>';
      setStatus('Type a query to search your library.');
      countEl.textContent = '';
    }

    // Typing in search bar clears similar mode
    searchInput.addEventListener('focus', () => {
      if (similarBanner.classList.contains('active')) {
        similarBanner.classList.remove('active');
        similarThumb.src = '';
      }
    });

    // ── Reindex ──
    const reindexBtn   = document.getElementById('reindex-btn');
    const reindexLabel = document.getElementById('reindex-label');
    let reindexPollTimer = null;

    reindexBtn.addEventListener('click', async () => {
      const res  = await fetch('/reindex', { method: 'POST' });
      const data = await res.json();
      if (data.started) {
        setReindexRunning(true);
        pollReindexStatus();
      }
    });

    function setReindexRunning(running) {
      reindexBtn.disabled = running;
      reindexBtn.classList.toggle('running', running);
      reindexLabel.textContent = running ? 'indexing…' : 'reindex';
    }

    function pollReindexStatus() {
      clearTimeout(reindexPollTimer);
      reindexPollTimer = setTimeout(async () => {
        try {
          const res  = await fetch('/reindex/status');
          const data = await res.json();
          if (data.running) {
            pollReindexStatus(); // keep polling
          } else {
            setReindexRunning(false);
            if (data.last_result) {
              const r = data.last_result;
              if (r.error) {
                setStatus(`Reindex failed: ${r.error}`);
              } else {
                setStatus(`Reindex done — ${r.indexed} new, ${r.skipped} unchanged, ${r.failed} failed, ${r.stale_removed} removed`);
                if (currentQuery) runSearch(currentQuery);
              }
            }
          }
        } catch {
          setReindexRunning(false);
        }
      }, 1500);
    }

    // Restore running state if page is refreshed mid-job
    fetch('/reindex/status').then(r => r.json()).then(data => {
      if (data.running) { setReindexRunning(true); pollReindexStatus(); }
    });

    // ── Helpers ──
    function imgUrl(path, size) {
      return `/thumb?path=${encodeURIComponent(path)}&size=${size}`;
    }

    function isGif(path) {
      return path.toLowerCase().endsWith('.gif');
    }

    function rawUrl(path) {
      return `/raw?path=${encodeURIComponent(path)}`;
    }

    function setStatus(msg, loading = false) {
      spinner.classList.toggle('active', loading);
      statusText.textContent = msg;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
      // Escape backslashes first so Windows paths don't produce JS escape sequences
      // (e.g. \r in D:\references would be interpreted as carriage return).
      return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
